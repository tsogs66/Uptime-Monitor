global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # add an Alertmanager instance here if you deploy one

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # --- Prometheus monitoring itself ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Host metrics for this LXC (CPU, RAM, disk, network) ---
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # --- Uptime Kuma's own Prometheus metrics endpoint ---
  # (enable "Expose metrics" + set an API key in Uptime Kuma Settings > Monitor History,
  #  then uncomment and add basic_auth or the ?apikey= param as needed)
  # - job_name: "uptime-kuma"
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["uptime-kuma:3001"]

  # ===========================================================================
  # BLACKBOX PROBES — common web services, apps, sites, games, and infra
  # Uses the "http_2xx" module by default (HTTP/HTTPS reachability + latency).
  # Add/remove targets freely; each becomes its own metric series in Grafana.
  # ===========================================================================

  - job_name: "blackbox-http-common-services"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.google.com
          - https://www.cloudflare.com
          - https://www.github.com
          - https://www.microsoft.com
          - https://www.amazon.com
          - https://www.youtube.com
          - https://www.wikipedia.org
          - https://www.reddit.com
          - https://www.netflix.com
          - https://www.discord.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-http-games"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://steamstatus.com
          - https://status.epicgames.com
          - https://www.ea.com
          - https://www.xbox.com
          - https://status.playstation.com
          - https://www.minecraft.net
          - https://www.riotgames.com
          - https://www.battle.net
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # --- Financial / banking / e-wallet apps (PH-focused, edit freely) ---
  # These are the public web front-ends / status endpoints for common
  # banking and e-wallet apps. This only checks that the public site/portal
  # is reachable — it does NOT check your account or transactions.
  - job_name: "blackbox-http-financial-banking"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.gcash.com
          - https://www.maya.ph
          - https://www.bpi.com.ph
          - https://www.bdo.com.ph
          - https://www.metrobank.com.ph
          - https://www.unionbankph.com
          - https://www.rcbc.com
          - https://www.landbank.com
          - https://www.securitybank.com
          - https://www.psbank.com.ph
          - https://www.pnb.com.ph
          - https://www.chinabank.ph
          - https://www.grab.com/ph          # GrabPay
          - https://shopeepay.ph
          - https://www.coins.ph
          - https://www.paypal.com
        labels:
          group: "financial"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ===========================================================================
  # LOCAL NETWORK / INFRASTRUCTURE — file-based service discovery
  # Edit prometheus/targets/local-icmp-targets.yml and local-tcp-targets.yml
  # to add/remove your own router, NAS, servers, PCs, consoles, self-hosted
  # apps, etc. Prometheus auto-reloads these files on save — no restart needed.
  # ===========================================================================

  - job_name: "blackbox-icmp-local-network"
    metrics_path: /probe
    params:
      module: [icmp]
    file_sd_configs:
      - files:
          - "/etc/prometheus/targets/local-icmp-targets.yml"
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-tcp-local-network"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - "/etc/prometheus/targets/local-tcp-targets.yml"
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # --- Public DNS resolvers (also useful as WAN health anchors below) ---
  - job_name: "blackbox-icmp-public-dns"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 1.1.1.1        # Cloudflare DNS
          - 8.8.8.8        # Google DNS
          - 9.9.9.9        # Quad9 DNS
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ===========================================================================
  # WAN / UPLINK MONITORING — is the internet connection itself slow or down?
  # Scraped every 10s (faster than the 30s default) so latency spikes and
  # brief outages show up clearly instead of being averaged away.
  # Pairs with alert_rules.yml (WANDown / WANHighLatency / WANPacketLoss)
  # and the speedtest-exporter service in docker-compose.yml for periodic
  # real-world bandwidth tests.
  # ===========================================================================

  - job_name: "blackbox-icmp-wan-uplink"
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 1.1.1.1               # Cloudflare — primary WAN health anchor
          - 8.8.8.8               # Google — secondary anchor
          - 9.9.9.9               # Quad9 — tertiary anchor
          # If your ISP/router gateway differs from the router IP above,
          # add it here too so you can tell "modem-to-ISP" apart from
          # "ISP-to-internet" issues:
          # - 203.0.113.1         # <- example ISP gateway/next-hop IP
        labels:
          group: "wan"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-http-wan-uplink"
    scrape_interval: 15s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.google.com
          - https://www.cloudflare.com
        labels:
          group: "wan"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # --- Periodic real WAN bandwidth test (down/up Mbps, ping) via Ookla Speedtest ---
  - job_name: "speedtest-exporter"
    scrape_interval: 5m       # speed tests are heavier; don't run them too often
    scrape_timeout: 90s
    static_configs:
      - targets: ["speedtest-exporter:9798"]
        labels:
          group: "wan"
